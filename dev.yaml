- name: Install Dev packages
  ansible.builtin.apt:
    package:
      - python3
      - python3-pip
      - python3-venv
      - python3-all-dev
      - python3-setuptools

- name: Setup NodeJS
  block:
    - name: Check for NodeJS gpg key
      ansible.builtin.stat:
        path: /etc/apt/trusted.gpg.d/nodejs.gpg
      register: has_node
      # curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
    - when: has_node.stat.exists == False
      block:
        - name: Create temporary directory
          ansible.builtin.tempfile:
            state: directory
            suffix: -nodejs
          register: temp_dir
        - name: Download nodejs signing key
          ansible.builtin.get_url:
            url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
            dest: "{{ temp_dir.path }}/nodejs.asc"
        - name: Convert nodejs signing key
          ansible.builtin.command:
            cmd: "gpg --dearmor -o /etc/apt/trusted.gpg.d/nodejs.gpg {{ temp_dir.path }}/nodejs.asc"
            creates: /etc/apt/trusted.gpg.d/nodejs.gpg
    - name: Add nodejs apt repository
      ansible.builtin.deb822_repository:
        name: nodejs
        types: deb
        uris: "https://deb.nodesource.com/node_{{ node_version }}.x"
        architectures:
          - "{{ deb_arch.stdout }}"
        components:
          - main
        suites: nodistro
        signed_by: /etc/apt/trusted.gpg.d/nodejs.gpg
    - name: Install NodeJS
      apt:
        pkg: nodejs

- name: Setup Docker
  block:
    - name: Check for Docker gpg key
      ansible.builtin.stat:
        path: /etc/apt/trusted.gpg.d/docker.gpg
      register: has_docker_key
      ignore_errors: true
    - when: has_docker_key.stat.exists == False
      block:
        - name: Create temporary directory
          ansible.builtin.tempfile:
            state: directory
            suffix: -docker
          register: temp_dir
        - name: Import Docker Signing Key
          ansible.builtin.get_url:
            url: https://download.docker.com/linux/ubuntu/gpg
            dest: "{{ temp_dir.path }}/docker.asc"
        - name: Convert Docker Signing Key
          ansible.builtin.command:
            cmd: "gpg --dearmor -o /etc/apt/trusted.gpg.d/docker.gpg {{ temp_dir.path }}/docker.asc"
            creates: /etc/apt/trusted.gpg.d/docker.gpg
    - name: Add Docker Repo
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        uris: https://download.docker.com/linux/ubuntu
        architectures:
          - "{{ deb_arch.stdout }}"
        components:
          - stable
        suites: "{{ ansible_distribution_release }}"
        signed_by: /etc/apt/trusted.gpg.d/docker.gpg
    - name: Install Docker
      ansible.builtin.apt:
        package:
          - apt-transport-https
          - ca-certificates
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          # update_cache: true
    - name: Add user to Docker group
      ansible.builtin.user:
        name: "{{ docker_user }}"
        append: true
        groups:
          - docker
