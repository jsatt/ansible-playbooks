- name: Add User
  ansible.builtin.user:
    name: "{{ username }}"
    append: true
    groups:
      - sudo
    shell: /bin/zsh

- name: Add sudoer
  community.general.sudoers:
    name: "{{ username }}"
    user: "{{ username }}"
    commands: ALL

- name: Setup Dotfiles
  when: dotfiles_repo != ""
  become: true
  become_user: "{{ username }}"
  block:
    - name: Install Chezmoi
      ansible.builtin.shell:
        cmd: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "{{ home_dir}}/bin
        creates: "{{ home_dir }}/bin/chezmoi"
    - name: Setup Dotfiles
      ansible.builtin.command:
        cmd: chezmoi init --ssh --apply --promptDefaults --force "{{ dotfiles_repo }}"
        creates: "{{ home_dir }}/.local/share/chezmoi"
